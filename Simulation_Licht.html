<!DOCTYPE html>
<!-- Sprache -->
<html lang="de">                                                                
<head>
    <!-- Was das? -->
    <meta charset="UTF-8">                                                  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <!-- Name des Tabs -->
    <title>Ausbreitung von Licht</title>      
    <!-- Verlinkung zum CSS-Stylesheet -->                                                                      
    <link rel="stylesheet" type="text/css" href="style.css">                
</head>
<body>
    <!-- Überschrift -->
    <h1>Wie breitet sich Licht von einer Lichtquelle aus?</h1>
    
    <!-- Simulationsläche; id um ein Element zu eindeutig zu bestimmen -->
    <div id="simulationsfläche"></div>

    <!-- Knöpfe -->
    <div id="button-container">
       <button id="licht-aus">Licht aus</button>
       <button id="licht-an">Licht an</button>  
       <button id="pauseBtn">Pausieren</button>
       <button id="farbfilter">Licht mit Farbfilter</button>
       <button id="resetBtn">Zurücksetzen</button>
    </div>
<!-- Verbindung zur Funktion von Buttons -->
    <script src="script.js"></script> 
</body>
</html>
